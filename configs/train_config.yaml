model:
  name: efficientnet-b4
  num_classes: 8
  pretrained: true
  dropout: 0.3

classes:
  - oil_stain
  - dye_stain
  - hole_snag
  - drop_stitch
  - weave_distortion
  - slub_nep
  - shade_variation
  - shrinkage

data:
  train_dir: data/augmented/train
  val_dir: data/augmented/val
  test_dir: data/raw/test
  image_size: 380
  num_workers: 4

training:
  epochs: 50
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 5
  early_stopping_patience: 10
  mixed_precision: true

augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation_limit: 15
  brightness_limit: 0.3
  contrast_limit: 0.3
  humidity_simulation: true
  clahe: true

output:
  checkpoint_dir: models/efficientnet
  mlflow_experiment: fabric-defect-efficientnet
