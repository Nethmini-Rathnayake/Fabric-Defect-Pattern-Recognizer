model:
  name: mobilenet-v3-small
  num_classes: 4
  pretrained: true
  dropout: 0.3

classes:
  - normal
  - stain
  - tear
  - weave_distortion

data:
  train_dir: data/images/train
  val_dir: data/images/val
  test_dir: data/images/val
  image_size: 64
  num_workers: 0

training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 3
  early_stopping_patience: 7
  mixed_precision: false

augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation_limit: 15
  brightness_limit: 0.3
  contrast_limit: 0.3
  humidity_simulation: true
  clahe: true

output:
  checkpoint_dir: models/efficientnet
  mlflow_experiment: fabric-defect-mobilenetv3
